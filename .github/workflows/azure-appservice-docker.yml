name: Build and Deploy Laravel to Azure App Service (Docker)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-azure-appservice
  cancel-in-progress: true

env:
  IMAGE_NAME: droniauth

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry (RBAC)
        run: |
          ACR_NAME="${{ vars.ACR_NAME }}"
          if [ -z "$ACR_NAME" ]; then
            ACR_NAME="${{ vars.ACR_LOGIN_SERVER }}"
            ACR_NAME="${ACR_NAME%%.*}"
          fi

          az acr login --name "$ACR_NAME"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: droni-auth
          images: ${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
